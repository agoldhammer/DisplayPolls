<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polls</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 700px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #222;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
  }
  #last-updated {
    font-size: 0.85rem;
    font-weight: normal;
    color: #777;
  }
  h2 {
    font-size: 1.15rem;
    margin: 1.5rem 0 1rem;
  }
  hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 2rem 0;
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    margin: 0.4rem 0;
  }
  li a {
    color: #0645ad;
    text-decoration: none;
  }
  li a:hover {
    text-decoration: underline;
  }
  #status {
    color: #a00;
  }
</style>
</head>
<body>
<h1>Polls <span id="last-updated"></span></h1>

<h2>French Polling</h2>
<ul id="french-poll-list"></ul>

<hr>

<h2>German Polling</h2>
<ul id="german-poll-list"></ul>

<hr>

<h2>Italian Polling</h2>
<ul id="italian-poll-list"></ul>

<hr>

<h2>UK Polling</h2>
<ul id="uk-poll-list"></ul>

<p id="status"></p>

<script src="index.js"></script>
</body>
</html>
