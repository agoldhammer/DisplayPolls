<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polls</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 700px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #222;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
  }
  ul {
    list-style: none;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }
  li {
    text-align: center;
  }
  li a {
    color: #0645ad;
    text-decoration: none;
    display: block;
  }
  li img {
    max-width: 100%;
    height: 120px;
    object-fit: contain;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fafafa;
  }
  li span {
    display: block;
    margin-top: 0.3rem;
    font-size: 0.8rem;
    word-break: break-all;
  }
  li a:hover span {
    text-decoration: underline;
  }
  #status {
    color: #a00;
  }
</style>
</head>
<body>
<h1>Polls</h1>
<ul id="poll-list"></ul>
<p id="status"></p>

<script src="index.js"></script>
</body>
</html>
